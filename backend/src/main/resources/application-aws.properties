# Profil CLOUD (ECS Fargate). Datasource injectée par ECS via variables d'env.
spring.docker.compose.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka retiré du cloud : on désactive le client et on exclut l'auto-config
# (les beans GameEventProducer/Consumer sont @ConditionalOnProperty -> absents proprement).
spring.kafka.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
