name: Mirror to GitLab

# Pousse main + tags vers le dépôt GitLab (le rendu) à chaque push.
# Secrets à créer dans GitHub (Settings → Secrets and variables → Actions) :
#   - GITLAB_REPO  : chemin sans https://, ex. gitlab.com/mon-groupe/gameio.git
#   - GITLAB_TOKEN : Project/Personal Access Token GitLab avec scope write_repository
on:
  push:
    branches: [ main ]
    tags: [ '*' ]

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet pour un push cohérent

      - name: Push vers GitLab
        env:
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          # Tolère un https:// collé par erreur dans le secret GITLAB_REPO
          REPO="${GITLAB_REPO#https://}"
          REPO="${REPO#http://}"
          echo "Cible mirror : https://oauth2:***@${REPO}"   # host visible, token masqué
          git push --force "https://oauth2:${GITLAB_TOKEN}@${REPO}" \
            "HEAD:refs/heads/main" --tags
