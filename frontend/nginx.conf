server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA Angular : toute route inconnue renvoie index.html
    # (sinon /games rechargé en F5 => 404). Le routeur Angular prend le relais.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets fingerprintés (main.[hash].js), pas pour l'index.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # En local/docker-compose : proxy des appels API vers le backend.
    # En cloud (S3), ce bloc est ignoré : c'est l'ALB qui route /api vers ECS.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
